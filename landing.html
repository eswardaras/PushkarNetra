<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Godavari Pushkaralu | Dashboard Designs</title>

  <!-- Google Fonts – Marcellus SC + Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Marcellus+SC&family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500&display=swap" rel="stylesheet">

  <!-- Tailwind via CDN -->
  <script src="https://cdn.tailwindcss.com">
  </script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            marcellus: ['"Marcellus SC"', 'serif'],
            body: ['Inter', 'sans-serif'],
          },
          colors: {
            gold: '#d4a853',
            'gold-light': '#e8c97a',
            river: '#0a1f2f',
            'river-deep': '#06141e',
            saffron: '#e8933a',
            cream: '#fdf6ec',
          }
        }
      }
    }
  </script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      background: #0a1f2f;
      overflow-x: hidden;
    }

    /* ===== BACKGROUND RIVER LAYER ===== */
    .bg-river {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse at 50% 0%, rgba(26,107,94,0.25) 0%, transparent 60%),
        radial-gradient(ellipse at 30% 70%, rgba(212,168,83,0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 70% 60%, rgba(232,147,58,0.06) 0%, transparent 50%),
        linear-gradient(180deg, #06141e 0%, #0a1f2f 15%, #0d2840 40%, #0f2d4a 60%, #0d2840 80%, #0a1f2f 100%);
    }

    .bg-river::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        repeating-radial-gradient(circle at 20% 30%, transparent 0, transparent 60px, rgba(212,168,83,0.03) 60px, rgba(212,168,83,0.03) 61px),
        repeating-radial-gradient(circle at 75% 65%, transparent 0, transparent 80px, rgba(232,147,58,0.025) 80px, rgba(232,147,58,0.025) 81px),
        repeating-radial-gradient(circle at 50% 80%, transparent 0, transparent 100px, rgba(26,107,94,0.03) 100px, rgba(26,107,94,0.03) 101px);
      animation: rippleDrift 25s ease-in-out infinite;
    }

    @keyframes rippleDrift {
      0%, 100% { transform: translate(0, 0) scale(1); }
      25% { transform: translate(15px, -8px) scale(1.03); }
      50% { transform: translate(-10px, 5px) scale(0.98); }
      75% { transform: translate(8px, -3px) scale(1.02); }
    }

    /* ===== FLOATING DIYA PARTICLES ===== */
    .diya-particle {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      animation: floatDiya linear infinite;
      filter: blur(2px);
    }

    @keyframes floatDiya {
      0% { transform: translateY(105vh) translateX(0) scale(0); opacity: 0; }
      5% { opacity: 0.7; }
      20% { transform: translateY(75vh) translateX(25px) scale(1); opacity: 0.6; }
      50% { transform: translateY(40vh) translateX(-20px) scale(0.7); opacity: 0.35; }
      80% { transform: translateY(15vh) translateX(15px) scale(0.35); opacity: 0.12; }
      95% { opacity: 0; }
      100% { transform: translateY(-10vh) translateX(-10px) scale(0); opacity: 0; }
    }

    /* ===== WAVE ANIMATION (bottom) ===== */
    .wave-container {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 0;
      pointer-events: none;
      line-height: 0;
    }
    .wave-container svg {
      display: block;
      width: 100%;
      height: auto;
    }
    .wave-layer-1 { animation: waveShift1 8s ease-in-out infinite; }
    .wave-layer-2 { animation: waveShift2 12s ease-in-out infinite; }
    .wave-layer-3 { animation: waveShift3 16s ease-in-out infinite; }
    @keyframes waveShift1 {
      0%, 100% { transform: translateX(0); }
      50% { transform: translateX(-25px); }
    }
    @keyframes waveShift2 {
      0%, 100% { transform: translateX(0); }
      50% { transform: translateX(30px); }
    }
    @keyframes waveShift3 {
      0%, 100% { transform: translateX(0); }
      50% { transform: translateX(-18px); }
    }

    /* ===== ORNAMENTAL DIVIDER ===== */
    .ornamental-divider {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    .ornamental-divider .line {
      height: 2px;
      width: 70px;
      background: linear-gradient(90deg, transparent, #d4a853, transparent);
      border-radius: 1px;
    }
    .ornamental-divider .diamond {
      width: 10px;
      height: 10px;
      background: #d4a853;
      transform: rotate(45deg);
      border-radius: 2px;
      box-shadow: 0 0 14px rgba(212,168,83,0.6);
      animation: diamondPulse 3s ease-in-out infinite;
    }
    @keyframes diamondPulse {
      0%, 100% { box-shadow: 0 0 14px rgba(212,168,83,0.6); }
      50% { box-shadow: 0 0 24px rgba(244,185,66,0.9); }
    }

    /* ===== CARD STYLES ===== */
    .sacred-card {
      position: relative;
      background: linear-gradient(180deg, #fefaf2 0%, #fdf6ec 30%, #faf1e0 100%);
      border-radius: 18px;
      cursor: pointer;
      transition: all 0.45s cubic-bezier(0.25, 0.8, 0.25, 1.2);
      box-shadow:
        0 4px 24px rgba(0,0,0,0.3),
        0 0 0 1px rgba(212,168,83,0.25),
        0 0 0 4px rgba(212,168,83,0.08),
        0 0 0 8px rgba(212,168,83,0.04);
      overflow: visible;
      z-index: 1;

      /* continuous subtle float animation */
      animation: cardFloat 6s ease-in-out infinite;
    }

    @keyframes cardFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    /* pause float on hover to allow hover lift */
    .sacred-card:hover {
      animation-play-state: paused;
      transform: translateY(-10px);
      box-shadow:
        0 20px 50px rgba(0,0,0,0.45),
        0 0 0 1px rgba(212,168,83,0.5),
        0 0 30px rgba(244,185,66,0.3),
        0 0 60px rgba(212,168,83,0.15),
        0 0 0 4px rgba(212,168,83,0.2),
        0 0 0 8px rgba(212,168,83,0.1);
    }

    /* top golden line */
    .sacred-card::before {
      content: '';
      position: absolute;
      top: -2px;
      left: 20px;
      right: 20px;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(212,168,83,0.5) 15%, rgba(232,201,122,0.8) 50%, rgba(212,168,83,0.5) 85%, transparent);
      border-radius: 1px;
      transition: all 0.45s ease;
    }
    .sacred-card:hover::before {
      background: linear-gradient(90deg, transparent, rgba(244,185,66,0.7) 10%, rgba(244,185,66,1) 50%, rgba(244,185,66,0.7) 90%, transparent);
      left: 10px;
      right: 10px;
    }

    /* bottom line */
    .sacred-card::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 30px;
      right: 30px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(212,168,83,0.3) 20%, rgba(212,168,83,0.6) 50%, rgba(212,168,83,0.3) 80%, transparent);
      border-radius: 1px;
      transition: all 0.45s ease;
    }
    .sacred-card:hover::after {
      background: linear-gradient(90deg, transparent, rgba(244,185,66,0.5) 15%, rgba(244,185,66,0.8) 50%, rgba(244,185,66,0.5) 85%, transparent);
    }

    /* top arch decoration */
    .card-arch {
      position: absolute;
      top: -14px;
      left: 50%;
      transform: translateX(-50%);
      width: 50px;
      height: 28px;
      border-radius: 50px 50px 0 0;
      border: 2px solid rgba(212,168,83,0.5);
      border-bottom: none;
      background: transparent;
      transition: all 0.45s ease;
      z-index: 2;
    }
    .sacred-card:hover .card-arch {
      border-color: rgba(244,185,66,0.9);
      box-shadow: 0 -4px 16px rgba(244,185,66,0.35);
      width: 56px;
      height: 32px;
      top: -16px;
    }

    /* corner ornaments */
    .corner-ornament {
      position: absolute;
      width: 18px;
      height: 18px;
      pointer-events: none;
      z-index: 3;
      transition: all 0.45s ease;
    }
    .corner-ornament::before, .corner-ornament::after {
      content: '';
      position: absolute;
      background: rgba(212,168,83,0.5);
      border-radius: 1px;
      transition: all 0.45s ease;
    }
    .corner-ornament::before { width: 10px; height: 2px; top: 0; left: 0; }
    .corner-ornament::after { width: 2px; height: 10px; top: 0; left: 0; }
    .corner-ornament.top-left { top: 8px; left: 8px; }
    .corner-ornament.top-right { top: 8px; right: 8px; }
    .corner-ornament.bottom-left { bottom: 8px; left: 8px; }
    .corner-ornament.bottom-right { bottom: 8px; right: 8px; }
    .sacred-card:hover .corner-ornament::before,
    .sacred-card:hover .corner-ornament::after {
      background: rgba(244,185,66,0.85);
    }

    /* Entrance animation (staggered) */
    .card-animate {
      opacity: 0;
      transform: translateY(40px);
      animation: cardFadeIn 0.8s cubic-bezier(0.23, 1, 0.32, 1) forwards;
    }
    .card-animate:nth-child(1) { animation-delay: 0.1s; }
    .card-animate:nth-child(2) { animation-delay: 0.3s; }
    .card-animate:nth-child(3) { animation-delay: 0.5s; }
    @keyframes cardFadeIn {
      to { opacity: 1; transform: translateY(0); }
    }

    /* Responsive adjustments */
    @media (max-width: 768px) {
      .sacred-card:hover { transform: translateY(-6px); }
      .ornamental-divider .line { width: 40px; }
    }
  </style>
</head>
<body class="font-body text-cream antialiased">

  <!-- BACKGROUND & PARTICLES -->
  <div class="bg-river"></div>
  <div class="diya-particle" style="left: 10%; width: 6px; height: 6px; background: rgba(244,185,66,0.7); animation-duration: 14s; animation-delay: 0s;"></div>
  <div class="diya-particle" style="left: 25%; width: 4px; height: 4px; background: rgba(232,147,58,0.6); animation-duration: 18s; animation-delay: 3s;"></div>
  <div class="diya-particle" style="left: 45%; width: 7px; height: 7px; background: rgba(244,185,66,0.55); animation-duration: 16s; animation-delay: 6s;"></div>
  <div class="diya-particle" style="left: 60%; width: 5px; height: 5px; background: rgba(212,168,83,0.65); animation-duration: 20s; animation-delay: 2s;"></div>
  <div class="diya-particle" style="left: 75%; width: 6px; height: 6px; background: rgba(244,185,66,0.5); animation-duration: 15s; animation-delay: 8s;"></div>
  <div class="diya-particle" style="left: 88%; width: 4px; height: 4px; background: rgba(232,147,58,0.55); animation-duration: 22s; animation-delay: 4s;"></div>
  <div class="diya-particle" style="left: 32%; width: 5px; height: 5px; background: rgba(244,185,66,0.5); animation-duration: 19s; animation-delay: 10s;"></div>
  <div class="diya-particle" style="left: 68%; width: 6px; height: 6px; background: rgba(212,168,83,0.55); animation-duration: 13s; animation-delay: 7s;"></div>

  <!-- BOTTOM WAVES -->
  <div class="wave-container">
    <svg class="wave-layer-3" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 200" preserveAspectRatio="none">
      <path fill="rgba(13,40,64,0.7)" d="M0,120 C240,160 480,40 720,80 C960,120 1200,160 1440,90 L1440,200 L0,200 Z"></path>
    </svg>
    <svg class="wave-layer-2" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 180" preserveAspectRatio="none" style="margin-top: -40px;">
      <path fill="rgba(10,31,47,0.8)" d="M0,100 C360,30 480,150 720,100 C960,50 1200,140 1440,80 L1440,180 L0,180 Z"></path>
    </svg>
    <svg class="wave-layer-1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 160" preserveAspectRatio="none" style="margin-top: -30px;">
      <path fill="rgba(6,20,30,0.9)" d="M0,80 C200,130 400,20 720,70 C1040,120 1200,40 1440,90 L1440,160 L0,160 Z"></path>
    </svg>
  </div>

  <!-- MAIN CONTENT -->
  <main class="relative z-10 flex flex-col items-center justify-center min-h-screen px-4 py-12 sm:px-6 lg:px-8">
    <div class="w-full max-w-6xl mx-auto">

      <!-- HEADER -->
      <header class="text-center mb-14 sm:mb-18 lg:mb-20">
        <!-- Sacred symbol -->
        <div class="flex justify-center mb-6">
          <div class="relative">
            <div class="w-16 h-16 sm:w-20 sm:h-20 rounded-full flex items-center justify-center"
                 style="background: radial-gradient(circle, rgba(244,185,66,0.35) 0%, rgba(212,168,83,0.15) 40%, transparent 70%);
                        box-shadow: 0 0 50px rgba(244,185,66,0.3), 0 0 100px rgba(212,168,83,0.15);">
              <span class="text-3xl sm:text-4xl select-none" style="color: #f4b942; text-shadow: 0 0 20px rgba(244,185,66,0.6);">ॐ</span>
            </div>
          </div>
        </div>

        <h1 class="font-marcellus text-4xl sm:text-5xl md:text-6xl lg:text-7xl text-center tracking-wider leading-tight"
            style="background: linear-gradient(180deg, #fdf6ec 0%, #e8c97a 30%, #d4a853 55%, #b8913a 100%);
                   -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
                   filter: drop-shadow(0 2px 8px rgba(212,168,83,0.4)); letter-spacing: 0.06em;">
          Godavari Pushkaralu
        </h1>

        <div class="ornamental-divider mt-6 mb-3">
          <span class="line"></span>
          <span class="diamond"></span>
          <span class="line"></span>
        </div>

        <p class="text-center text-sm sm:text-base lg:text-lg tracking-widest uppercase mt-4"
           style="color: rgba(232,201,122,0.8); letter-spacing: 0.15em;">
          Dashboard Design Collection
        </p>
        <p class="text-center text-xs sm:text-sm mt-3 max-w-xl mx-auto leading-relaxed"
           style="color: rgba(200,190,170,0.7);">
          Three distinct dashboard concepts — each opens in a new tab
        </p>
      </header>

      <!-- CARDS GRID -->
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 sm:gap-10 lg:gap-12 px-2 sm:px-4">

        <!-- CARD 1 : Design One -->
        <a href="/design-one" target="_blank" rel="noopener noreferrer"
           class="sacred-card card-animate block group p-8 sm:p-10 pt-10 pb-9 no-underline"
           title="Open Design One in new tab">
          <span class="corner-ornament top-left"></span>
          <span class="corner-ornament top-right"></span>
          <span class="corner-ornament bottom-left"></span>
          <span class="corner-ornament bottom-right"></span>
          <span class="card-arch"></span>

          <div class="relative z-10 text-center flex flex-col items-center justify-center h-full min-h-[120px]">
            <!-- Small decorative diamond -->
            <div class="mb-6 w-6 h-6 transform rotate-45 rounded-sm opacity-70 group-hover:opacity-100 transition-opacity duration-500"
                 style="background: #d4a853; box-shadow: 0 0 10px rgba(212,168,83,0.5);"></div>

            <h3 class="font-marcellus text-2xl sm:text-3xl md:text-4xl tracking-wider transition-colors duration-300"
                style="color: #1a3a4a; letter-spacing: 0.06em;">
              Design One
            </h3>

            <!-- subtle arrow on hover -->
            <span class="mt-5 opacity-0 group-hover:opacity-100 transition-all duration-400 flex items-center gap-1 text-xs uppercase tracking-widest"
                  style="color: #b8913a;">
              Explore <span class="text-lg leading-none">→</span>
            </span>
          </div>
        </a>

        <!-- CARD 2 : Design Two -->
        <a href="/design-two" target="_blank" rel="noopener noreferrer"
           class="sacred-card card-animate block group p-8 sm:p-10 pt-10 pb-9 no-underline"
           title="Open Design Two in new tab">
          <span class="corner-ornament top-left"></span>
          <span class="corner-ornament top-right"></span>
          <span class="corner-ornament bottom-left"></span>
          <span class="corner-ornament bottom-right"></span>
          <span class="card-arch"></span>

          <div class="relative z-10 text-center flex flex-col items-center justify-center h-full min-h-[120px]">
            <div class="mb-6 w-6 h-6 transform rotate-45 rounded-sm opacity-70 group-hover:opacity-100 transition-opacity duration-500"
                 style="background: #d4a853; box-shadow: 0 0 10px rgba(212,168,83,0.5);"></div>

            <h3 class="font-marcellus text-2xl sm:text-3xl md:text-4xl tracking-wider transition-colors duration-300"
                style="color: #1a3a4a; letter-spacing: 0.06em;">
              Design Two
            </h3>

            <span class="mt-5 opacity-0 group-hover:opacity-100 transition-all duration-400 flex items-center gap-1 text-xs uppercase tracking-widest"
                  style="color: #b8913a;">
              Explore <span class="text-lg leading-none">→</span>
            </span>
          </div>
        </a>

        <!-- CARD 3 : Design Three -->
        <a href="/design-three" target="_blank" rel="noopener noreferrer"
           class="sacred-card card-animate block group p-8 sm:p-10 pt-10 pb-9 no-underline"
           title="Open Design Three in new tab">
          <span class="corner-ornament top-left"></span>
          <span class="corner-ornament top-right"></span>
          <span class="corner-ornament bottom-left"></span>
          <span class="corner-ornament bottom-right"></span>
          <span class="card-arch"></span>

          <div class="relative z-10 text-center flex flex-col items-center justify-center h-full min-h-[120px]">
            <div class="mb-6 w-6 h-6 transform rotate-45 rounded-sm opacity-70 group-hover:opacity-100 transition-opacity duration-500"
                 style="background: #d4a853; box-shadow: 0 0 10px rgba(212,168,83,0.5);"></div>

            <h3 class="font-marcellus text-2xl sm:text-3xl md:text-4xl tracking-wider transition-colors duration-300"
                style="color: #1a3a4a; letter-spacing: 0.06em;">
              Design Three
            </h3>

            <span class="mt-5 opacity-0 group-hover:opacity-100 transition-all duration-400 flex items-center gap-1 text-xs uppercase tracking-widest"
                  style="color: #b8913a;">
              Explore <span class="text-lg leading-none">→</span>
            </span>
          </div>
        </a>
      </div>

      <!-- FOOTER NOTE -->
      <footer class="text-center mt-16 sm:mt-20">
        <p class="text-xs tracking-widest uppercase" style="color: rgba(180,160,130,0.5); letter-spacing: 0.2em;">
          Click any card to open the design · new tab
        </p>
        <div class="flex justify-center gap-2 mt-4">
          <span class="w-1.5 h-1.5 rounded-full" style="background: rgba(212,168,83,0.4);"></span>
          <span class="w-1.5 h-1.5 rounded-full" style="background: rgba(212,168,83,0.3);"></span>
          <span class="w-1.5 h-1.5 rounded-full" style="background: rgba(212,168,83,0.5);"></span>
          <span class="w-1.5 h-1.5 rounded-full" style="background: rgba(212,168,83,0.3);"></span>
          <span class="w-1.5 h-1.5 rounded-full" style="background: rgba(212,168,83,0.4);"></span>
        </div>
      </footer>
    </div>
  </main>

  <!-- additional floating particles (injected via JS) -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const body = document.body;
      for (let i = 0; i < 6; i++) {
        const particle = document.createElement('div');
        particle.classList.add('diya-particle');
        const size = Math.random() * 5 + 3;
        particle.style.width = size + 'px';
        particle.style.height = size + 'px';
        particle.style.left = (Math.random() * 90 + 5) + '%';
        particle.style.background = `rgba(${244 + Math.random()*10}, ${185 + Math.random()*20}, ${66 + Math.random()*15}, ${0.4 + Math.random()*0.35})`;
        particle.style.animationDuration = (Math.random() * 14 + 10) + 's';
        particle.style.animationDelay = (Math.random() * 12) + 's';
        body.appendChild(particle);
      }
    });
  </script>
</body>
</html>
